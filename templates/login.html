{% extends "base.html" %}

{% block title %}Login | Loan Approval Prediction System{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card card-banking">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-bank2 text-primary" style="font-size: 2.5rem;"></i>
                        <h4 class="fw-bold mt-2">Welcome Back</h4>
                        <p class="text-muted small mb-0">Log in to access your loan dashboard.</p>
                    </div>

                    <form method="POST" action="{{ url_for('login') }}" class="form-banking needs-validation" novalidate>
                        <div class="mb-3">
                            <label for="username">Username</label>
                            <input type="text" class="form-control" id="username" name="username" required autofocus>
                            <div class="invalid-feedback">Please enter your username.</div>
                        </div>
                        <div class="mb-3">
                            <label for="password">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                            <div class="invalid-feedback">Please enter your password.</div>
                        </div>
                        <button type="submit" class="btn btn-banking-primary w-100">
                            <i class="bi bi-box-arrow-in-right me-1"></i> Login
                        </button>
                    </form>

                    <p class="text-center text-muted small mt-3 mb-0">
                        Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
